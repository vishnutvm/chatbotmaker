# Railway service configuration for apps/api
# Docs: Docs/04-infrastructure.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"
watchPatterns = ["apps/api/**", "packages/types/**", "packages/config/**", "docker/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

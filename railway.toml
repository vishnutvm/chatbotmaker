# Primary API host — https://github.com/vishnutvm/chatbotmaker-docs (Docs/deployment/api-hosting.md)

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"
watchPatterns = ["apps/api/**", "packages/types/**", "packages/config/**", "docker/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Fallback API host — https://github.com/vishnutvm/chatbotmaker-docs (Docs/deployment/api-hosting.md)

services:
  - type: web
    name: genie-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically; apps/api reads process.env.PORT
      # - key: DATABASE_URL
      #   sync: false
      # - key: DIRECT_URL
      #   sync: false
      # - key: SUPABASE_URL
      #   sync: false
      # - key: SUPABASE_JWT_SECRET
      #   sync: false

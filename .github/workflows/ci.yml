name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version from package.json "packageManager" — do not set version here

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker-api:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f docker/Dockerfile -t genie-api:ci .

      - name: Verify container health
        run: |
          docker run -d --name genie-api-ci -p 4000:4000 -e PORT=4000 genie-api:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null; then
              curl -sf http://localhost:4000/health
              docker rm -f genie-api-ci
              exit 0
            fi
            sleep 2
          done
          docker logs genie-api-ci
          docker rm -f genie-api-ci
          exit 1

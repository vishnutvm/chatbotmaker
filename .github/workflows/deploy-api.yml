name: Deploy API

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/config/**'
      - 'docker/**'
      - 'railway.toml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Primary path: Mirror → Railway GitHub auto-deploy (see mirror-deploy-repo.yml).
    # Optional direct deploy: set ENABLE_RAILWAY_GHA_DEPLOY=true + RAILWAY_TOKEN
    # and RAILWAY_PROJECT_ID=cc493562-28cd-4b94-b4d7-d1afce1dba24 (genie-api).
    if: vars.ENABLE_RAILWAY_GHA_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || 'cc493562-28cd-4b94-b4d7-d1afce1dba24' }}
        run: |
          railway link --project "$RAILWAY_PROJECT_ID" --environment production --service "${{ vars.RAILWAY_SERVICE_NAME || 'genie-api' }}"
          railway up --service "${{ vars.RAILWAY_SERVICE_NAME || 'genie-api' }}" --detach

# Deploy NestJS API to Railway from `main`.
#
# Primary path: Railway GitHub integration on
#   repo = vishnutvm/chatbotmaker
#   branch = main
#   service = genie-api
# (configured via `railway service source connect`)
#
# Optional GHA direct deploy (push + workflow_dispatch):
#   vars.ENABLE_RAILWAY_GHA_DEPLOY=true
#   secrets.RAILWAY_TOKEN (account/project token)
#   optional vars: RAILWAY_PROJECT_ID, RAILWAY_SERVICE_NAME

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/config/**'
      - 'docker/**'
      - 'railway.toml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.ENABLE_RAILWAY_GHA_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || 'cc493562-28cd-4b94-b4d7-d1afce1dba24' }}
        run: |
          railway link --project "$RAILWAY_PROJECT_ID" --environment production --service "${{ vars.RAILWAY_SERVICE_NAME || 'genie-api' }}"
          railway up --service "${{ vars.RAILWAY_SERVICE_NAME || 'genie-api' }}" --detach -y

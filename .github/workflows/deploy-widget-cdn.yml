# Build embeddable widget.js and publish to Google Cloud Storage (optional).
#
# Always: build + upload GitHub Actions artifact.
# GCS publish when:
#   vars.ENABLE_WIDGET_CDN_DEPLOY == 'true'
#   secrets.GCP_SA_KEY (JSON service account) OR Workload Identity (future)
# Optional vars: GCP_PROJECT_ID, GCS_WIDGET_BUCKET, GCS_WIDGET_OBJECT_KEY, WIDGET_CDN_PUBLIC_URL
#
# Docs: docs/deployment/WIDGET_CDN.md

name: Deploy Widget CDN

on:
  push:
    branches: [main]
    paths:
      - 'apps/widget/**'
      - 'scripts/deploy-widget-cdn.sh'
      - 'scripts/deploy-widget-cdn.ps1'
      - '.github/workflows/deploy-widget-cdn.yml'
  workflow_dispatch:

concurrency:
  group: deploy-widget-cdn-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build widget
        run: pnpm --filter @genie/widget build

      - name: Test widget
        run: pnpm --filter @genie/widget test

      - name: Upload widget.js artifact
        uses: actions/upload-artifact@v4
        with:
          name: genie-widget-js
          path: apps/widget/dist/widget.js
          if-no-files-found: error
          retention-days: 30

  publish-gcs:
    runs-on: ubuntu-latest
    needs: build-artifact
    if: vars.ENABLE_WIDGET_CDN_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download widget.js artifact
        uses: actions/download-artifact@v4
        with:
          name: genie-widget-js
          path: apps/widget/dist

      - name: Check GCP secrets
        id: secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_SA_KEY" ] || [ -z "$GCP_PROJECT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping GCS publish — GCP_SA_KEY / GCP_PROJECT_ID not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: steps.secrets.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.secrets.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish to GCS
        if: steps.secrets.outputs.skip != 'true'
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCS_WIDGET_BUCKET: ${{ vars.GCS_WIDGET_BUCKET }}
          GCS_WIDGET_OBJECT_KEY: ${{ vars.GCS_WIDGET_OBJECT_KEY }}
          WIDGET_CDN_PUBLIC_URL: ${{ vars.WIDGET_CDN_PUBLIC_URL }}
          SKIP_BUILD: '1'
        run: bash ./scripts/deploy-widget-cdn.sh

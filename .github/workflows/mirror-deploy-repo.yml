# Mirrors source repo → deploy account repo for Railway GitHub auto-deploy.
# Railway project "genie-api" (cc493562-28cd-4b94-b4d7-d1afce1dba24) watches
# vishnuMChanthavila/chatbotmaker-deploy@main — do not point Railway at the wrong project.
#
# Secrets: DEPLOY_MIRROR_TOKEN (PAT on deploy account, Contents read/write)
# Variables: DEPLOY_MIRROR_REPO (e.g. vishnuMChanthavila/chatbotmaker-deploy)
# Optional: DEPLOY_MIRROR_BRANCH (default: main — Railway watches this branch)

name: Mirror to deploy repo

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/config/**'
      - 'docker/**'
      - 'render.yaml'
      - 'railway.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/mirror-deploy-repo.yml'
  workflow_dispatch:

concurrency:
  group: mirror-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: vars.DEPLOY_MIRROR_REPO != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify mirror token access
        env:
          MIRROR_TOKEN: ${{ secrets.DEPLOY_MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.DEPLOY_MIRROR_REPO }}
        run: |
          MIRROR_TOKEN="$(printf '%s' "$MIRROR_TOKEN" | tr -d '\r\n')"
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "DEPLOY_MIRROR_TOKEN secret is not set."
            exit 1
          fi
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${MIRROR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${MIRROR_REPO}")"
          echo "GitHub API repo access status: ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "Token cannot access ${MIRROR_REPO}. Regenerate PAT on vishnuMChanthavila with Contents read/write for that repo only."
            exit 1
          fi

      - name: Push to deploy mirror
        env:
          MIRROR_TOKEN: ${{ secrets.DEPLOY_MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.DEPLOY_MIRROR_REPO }}
          MIRROR_BRANCH: ${{ vars.DEPLOY_MIRROR_BRANCH || 'main' }}
        run: |
          MIRROR_TOKEN="$(printf '%s' "$MIRROR_TOKEN" | tr -d '\r\n')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Unset runner tokens so gh auth login uses our PAT (not GITHUB_TOKEN).
          unset GH_TOKEN GITHUB_TOKEN
          printf '%s\n' "$MIRROR_TOKEN" | gh auth login --with-token
          gh auth setup-git

          git remote add mirror "https://github.com/${MIRROR_REPO}.git"
          git push mirror "HEAD:refs/heads/${MIRROR_BRANCH}" --force
          echo "Mirrored ${GITHUB_REF_NAME} -> ${MIRROR_REPO}@${MIRROR_BRANCH}"
